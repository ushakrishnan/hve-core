name: behavior-conformance-skills
description: >
  Advisory-tier behavior conformance evals for 25 skills exercised across three
  stimulus shapes: knowledge (canonical concept attribution), tool-trigger
  (domain-intent skill attribution from a working context), and bleed-detection
  (correct refusal when an off-topic context superficially resembles the
  skill's domain). Total: 75 stimuli. Each tool-trigger stimulus uses two
  graders with AND logic, and the suite-level scoring threshold gates the
  aggregate pass rate across stimuli.
type: capability
defaults:
  runs: 3
  timeout: 120s
  executor: copilot-sdk

scoring:
  threshold: 0.6

stimuli:

  - name: skill-python-foundational-knowledge
    prompt: |
      Summarize the canonical Python idioms championed by the
      `python-foundational` skill. Cite at least three patterns it advises.
    tags:
      category: behavior-conformance
      skill: python-foundational
      shape: knowledge
      advisory: "true"
    graders:
      - type: output-matches
        name: skill-attribution
        config:
          pattern: '(?i)(dataclass|pathlib|type\s+hint|comprehension|context\s+manager)'
      - type: output-matches
        name: scope-language
        config:
          pattern: '(?i)(python|idiom|foundational|best\s+practice)'
  - name: skill-python-foundational-tool-trigger
    prompt: |
      I am authoring a new module at `scripts/utilities/helper.py` and want
      idiomatic, foundational Python patterns applied. Which skill under
      `.github/skills/**/SKILL.md` applies and what does it advise?
    tags:
      category: behavior-conformance
      skill: python-foundational
      shape: tool-trigger
      advisory: "true"
    graders:
      - type: output-matches
        name: skill-domain-attribution
        config:
          pattern: '(?i)(python|foundational|idiom|skill|pattern)'
      - type: output-matches
        name: scope-language
        config:
          pattern: '(?i)(python|idiom|skill|pattern)'
  - name: skill-python-foundational-bleed-detection
    prompt: |
      I am authoring a new TypeScript module at `extension/src/helper.ts`.
      Does the `python-foundational` skill apply here? Justify briefly.
    tags:
      category: behavior-conformance
      skill: python-foundational
      shape: bleed-detection
      advisory: "true"
    graders:
      - type: output-matches
        name: skill-attribution
        config:
          pattern: '(?i)(not\s+apply|does\s+not|inapplicable|different\s+skill|N\/A)'
      - type: output-matches
        name: scope-language
        config:
          pattern: '(?i)(typescript|javascript|python|scope)'
