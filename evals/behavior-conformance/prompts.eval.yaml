        config:
          pattern: "(?i)ADO\\s+backlog\\s+manager|ado-create-pull-request"
      - type: output-matches
        name: scope-language
        config:
          pattern: "(?i)pull\\s+request|work\\s+item|reviewer|Azure\\s+DevOps|ado-create-pull-request"

  - name: prompt-github-execute-backlog-conformance
    prompt: |
      Invoke the `github-execute-backlog` prompt with dryRun=true against a
      sample handoff.md file containing one Create operation.
