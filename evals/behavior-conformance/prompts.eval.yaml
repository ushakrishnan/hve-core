name: behavior-conformance-prompts
description: >
  Advisory-tier behavior conformance evals for high-traffic prompts. Each
  stimulus invokes the prompt and asserts attribution (the agent role name or
  the invoked prompt name) plus prompt-specific scope language. Per DD-05, this
  is an advisory tier and grader false-positives are absorbed by design.
type: capability
defaults:
  runs: 3
  timeout: 120s
  executor: copilot-sdk

stimuli:
  - name: prompt-task-research-conformance
    prompt: |
      Invoke the `task-research` prompt with topic="evaluate retry strategies
      for the eval runner". Produce the standard research handoff.
    tags:
      category: behavior-conformance
      prompt: task-research
      advisory: "true"
    graders:
      - type: output-matches
        name: agent-attribution
        config:
          pattern: "(?i)\\btask\\s+researcher\\b|task-research"
      - type: output-matches
        name: scope-language
        config:
          pattern: "(?i)research|implementation\\s+alternatives|tracking"

  - name: prompt-task-plan-conformance
    prompt: |
      Invoke the `task-plan` prompt against an existing research document
      under `.copilot-tracking/research/`. Produce an implementation plan.
    tags:
      category: behavior-conformance
      prompt: task-plan
      advisory: "true"
    graders:
      - type: output-matches
        name: agent-attribution
        config:
          pattern: "(?i)\\btask\\s+planner\\b|task-plan"
      - type: output-matches
        name: scope-language
        config:
          pattern: "(?i)implementation\\s+plan|planning|deferred|task-plan"

  - name: prompt-task-implement-conformance
    prompt: |
      Invoke the `task-implement` prompt with `phaseStop=true`. Execute the
      first phase of the most recent plan in `.copilot-tracking/plans/`.
    tags:
      category: behavior-conformance
      prompt: task-implement
      advisory: "true"
    graders:
      - type: output-matches
        name: agent-attribution
        config:
          pattern: "(?i)\\btask\\s+implementor\\b|task-implement|\\bplan\\b"
      - type: output-matches
        name: scope-language
        config:
          pattern: "(?i)\\bphase\\b|\\bstep\\b|implementation\\s+plan|task-implement|\\bplan\\b"

  - name: prompt-task-review-conformance
    prompt: |
      Invoke the `task-review` prompt with scope="today". Produce a review
      log with severity counts.
    tags:
      category: behavior-conformance
      prompt: task-review
      advisory: "true"
    graders:
      - type: output-matches
        name: agent-attribution
        config:
          pattern: "(?i)\\btask\\s+reviewer\\b|task-review"
      - type: output-matches
        name: scope-language
        config:
          pattern: "(?i)review\\s+log|severity|scope|task-review"

  - name: prompt-task-challenge-conformance
    prompt: |
      Invoke the `task-challenge` prompt with focus="error handling" against
      the most recent changes log.
    tags:
      category: behavior-conformance
      prompt: task-challenge
      advisory: "true"
    graders:
      - type: output-matches
        name: agent-attribution
        config:
          pattern: "(?i)\\btask\\s+challenger\\b|task-challenge"
      - type: output-matches
        name: scope-language
        config:
          pattern: "(?i)challenge|scope|focus"

  - name: prompt-security-review-conformance
    prompt: |
      Invoke the `security-review` prompt with mode=audit and
      targetSkill=owasp-top-10 against the current workspace.
    tags:
      category: behavior-conformance
      prompt: security-review
      advisory: "true"
    graders:
      - type: output-matches
        name: agent-attribution
        config:
          pattern: "(?i)security\\s+reviewer|security-review"
      - type: output-matches
        name: scope-language
        config:
          pattern: "(?i)OWASP|vulnerabilit|audit|skill|security-review"

  - name: prompt-ado-create-pull-request-conformance
    prompt: |
      Invoke the `ado-create-pull-request` prompt with isDraft=true to
      generate a PR description, discover work items, and identify reviewers.
