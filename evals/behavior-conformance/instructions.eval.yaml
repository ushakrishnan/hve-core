name: behavior-conformance-instructions
description: >
  Advisory-tier behavior conformance evals for 44 high-signal Markdown-applyTo
  instructions in `.github/instructions/**` (covers ADO, coding-standards,
  experimental, GitHub, hve-core, Jira, RAI planning, security, and shared
  scopes). Each stimulus prompts the model
  to identify the instruction that applies in a given working context and
  asserts both `applyTo` path evidence and instruction-specific scope
  vocabulary. Per DD-05, this is an advisory tier and grader false-positives
  are absorbed by design.
type: capability
defaults:
  runs: 3
  timeout: 120s
  executor: copilot-sdk

stimuli:
  - name: instruction-ado-backlog-sprint-conformance
    prompt: |
      You are preparing sprint planning artifacts under
      `.copilot-tracking/workitems/sprint/iter-42/`. Which
      `.github/instructions/**/*.instructions.md` file applies (cite its path)
      and summarize its top three requirements?
    tags:
      category: behavior-conformance
      instruction: ado-backlog-sprint
      advisory: "true"
    graders:
      - type: output-matches
        name: applyTo-evidence
        config:
          pattern: "(?i)\\.copilot-tracking/workitems/sprint|workitems/sprint/"
      - type: output-matches
        name: scope-language
        config:
          pattern: "(?i)sprint|iteration|capacity|coverage\\s+analysis"

  - name: instruction-ado-backlog-triage-conformance
    prompt: |
