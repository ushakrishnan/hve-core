stimuli:
  - name: dependency-reviewer-class-recipe
    prompt: |
      Review this dependency change with severity:
      ```diff
      -"lodash": "^4.17.21"
      +"lodash": "^3.0.0"
      ```

    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: findings-table-present
        config:
          pattern: '(?i)(\|.*severity.*\||finding|issue|concern|recommendation|violation)'
      - type: output-matches
        name: severity-vocab
        config:
          pattern: '(?i)(critical|high|medium|low|info|severity|warning)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true