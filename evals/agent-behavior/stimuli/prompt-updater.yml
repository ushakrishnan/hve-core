stimuli:
  - name: prompt-updater-tracking-and-status
    prompt: |
      You are the Prompt Updater subagent. The orchestrator hands you this input:
        - prompt_file: .github/prompts/hve-core/commit-message.prompt.md
        - requested_updates: Add a section describing scope tags and tighten the
          frontmatter description.
      Apply the updates following the prompt-builder and writing-style
      instructions. Report the tracking file path, each modified prompt file
      path with its status, a checklist of remaining work, and any clarifying
      questions.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: tracking-file-path
        config:
          pattern: '(?i)\.copilot-tracking[-/\\]prompts[-/\\]\d{4}-\d{2}-\d{2}[-/\\]'
      - type: output-matches
        name: prompt-file-path
        config:
          pattern: '(?i)\.github/prompts/.+\.prompt\.md'
      - type: output-matches
        name: status-per-file
        config:
          pattern: '(?i)\b(complete|in-progress|blocked)\b'
      - type: output-matches
        name: remaining-checklist
        config:
          pattern: '(?i)(- \[[ x]\]|checklist|remaining)'

  - name: prompt-updater-instructions-and-review
    prompt: |
      You are the Prompt Updater subagent. The orchestrator hands you this input:
        - prompt_file: .github/prompts/hve-core/pull-request.prompt.md
        - requested_updates: Clarify the reviewer-identification steps.
      Apply the updates, then run your review pass comparing requirements
      against the implemented changes and report gaps, drift, and clarifying
      questions.
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: instructions-followed
        config:
          pattern: '(?i)(prompt-builder|writing-style)'
      - type: output-matches
        name: gap-and-drift-review
        config:
          pattern: '(?i)(gap|drift|review|remaining|missing)'
      - type: output-matches
        name: clarifying-questions
        config:
          pattern: '(?i)clarifying question'
