stimuli:
  - name: pptx-class-recipe
    prompt: |
      Plan a 5-slide PowerPoint deck about "Q1 engineering velocity highlights." List phases (outline, draft, render, review). Write the plan under `.copilot-tracking/ppt/` and report the path.
    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: phase-marker-present
        config:
          pattern: '(?im)(^\s*(#{2,3}\s|step\s+\d+|phase\s+\d+|\d+[.)])|\|\s*\d+\s*[—–-]|\bphases?\b)'
      - type: output-matches
        name: tracking-file-write
        config:
          pattern: '(?i)\.copilot-tracking[-/\\](ppt|plans)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true
