stimuli:
  - name: ado-prd-to-wit-class-recipe
    prompt: |
      Take this PRD snippet: "Users can export reports to CSV." Convert it into Azure DevOps Epic + Feature + User Story drafts. Write the drafts under `.copilot-tracking/workitems/` and report the path you wrote them to.
    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: field-vocab-present
        config:
          pattern: '(?i)(title|description|acceptance criteria|iteration|area path|priority|work item type|epic|feature|user story)'
      - type: output-matches
        name: tracking-file-write
        config:
          pattern: '(?i)\.copilot-tracking[-/\\]workitems'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true
