stimuli:
  - name: code-review-functional-class-recipe
    prompt: |
      Review this function for correctness:
      ```python
      def divide(a, b):
          return a / b
      ```
      Identify edge cases or behavioral concerns with severity levels.
    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: findings-table-present
        config:
          pattern: '(?i)(\|.*severity.*\||finding|issue|concern|recommendation|violation)'
      - type: output-matches
        name: severity-vocab
        config:
          pattern: '(?i)(critical|high|medium|low|info|severity|warning)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true