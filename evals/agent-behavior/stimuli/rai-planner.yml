stimuli:
  - name: rai-planner-class-recipe
    prompt: |
      Begin an RAI planning session for an AI feature that auto-generates customer support replies. List the next phases of the assessment. Write the planning state under `.copilot-tracking/rai-plans/` and report the path you wrote it to.
    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: phase-marker-present
        config:
          pattern: '(?im)(^\s*(#{2,3}\s|step\s+\d+|phase\s+\d+|\d+[.)])|\|\s*\d+\s*[—–-]|\bphases?\b)'
      - type: output-matches
        name: tracking-file-write
        config:
          pattern: '(?i)\.copilot-tracking[-/\\]rai-plans'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true
  - name: rai-planner-disclaimer-startup
    prompt: |
      Use the workspace fixture at `eval-fixtures/rai-planner-disclaimer-startup.txt` as the startup scenario and required disclaimer text. Start exactly as that fixture requires.
    environment:
      files:
        - src: fixtures/rai-planner-disclaimer-startup.txt
          dest: eval-fixtures/rai-planner-disclaimer-startup.txt
    tags:
      category: agent-behavior
      scenario: startup-disclaimer
    graders:
      - type: output-matches
        name: caution-disclaimer
        config:
          pattern: '(?is)(\[!CAUTION\]|CAUTION).*Disclaimer.*assistive\s+tool\s+only'
      - type: output-matches
        name: rai-review-scope
        config:
          pattern: '(?i)RAI|Responsible\s+AI|legal|regulatory|compliance|qualified\s+human\s+reviewers'
      - type: output-matches
        name: disclaimer-state
        config:
          pattern: '(?i)disclaimerShownAt|ISO\s*8601'
