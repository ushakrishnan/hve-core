stimuli:
  - name: code-review-standards-class-recipe
    prompt: |
      Review this snippet against Python conventions:
      ```python
      def Get_User_Data(USER_ID):
         x=db.fetch(USER_ID)
         return x
      ```
      List style violations with severity.
    tags:
      category: agent-behavior
    graders:
      - type: output-matches
        name: findings-table-present
        config:
          pattern: '(?i)(\|.*severity.*\||finding|issue|concern|recommendation|violation)'
      - type: output-matches
        name: severity-vocab
        config:
          pattern: '(?i)(critical|high|medium|low|info|severity|warning)'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(\.cs|\.py|\.ts|\.js|package\.json)'
          negate: true