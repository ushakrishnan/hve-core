name: fixture-valid-spec
description: Minimal compliant spec used by Test-EvalSpec Pester tests.
type: capability
defaults:
  runs: 1
  timeout: 60s
  executor: copilot-sdk
scoring:
  threshold: 0.7

stimuli:
  - name: stimulus-without-backlink
    prompt: "What is the capital of France?"
    tags: {category: fixture}
    graders:
      - type: output-matches
        name: mentions-paris
        config: {pattern: '(?i)\bparis\b'}
