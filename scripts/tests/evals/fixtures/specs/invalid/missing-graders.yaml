name: fixture-missing-graders
description: Spec where a stimulus lacks any grader assertions.
type: capability
defaults:
  runs: 1
  timeout: 60s
  executor: copilot-sdk
scoring:
  threshold: 0.7

stimuli:
  - name: empty-graders
    prompt: "What is 2 + 2?"
    tags: {category: fixture}
    graders: []
